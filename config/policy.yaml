# ==========================================================================
# Warden — Agentic AI Gateway
# policy.yaml — the declarative rule set the proxy enforces on every tool call
# ==========================================================================
#
# Every tool call an agent makes flows through the proxy and is evaluated
# against this file. The proxy returns one of four decisions:
#
#   allow    — forward the call to the real MCP server unchanged
#   redact   — forward, but strip sensitive data from args and/or the response
#   escalate — pause and require a human yes/no before forwarding
#   deny     — block the call, return a safe error to the agent
#
# Design principle: DENY BY DEFAULT. A tool or path not explicitly allowed
# here is denied. This is the core of zero-trust: nothing is permitted until
# a rule permits it.
# ==========================================================================

version: 1

# --------------------------------------------------------------------------
# Enforcement mode. `enforce` blocks; `monitor` computes and audits every
# decision identically but lets execution proceed (the standard rollout path:
# observe, tune, then flip to enforce). Explicit here so nobody has to read
# source to learn the gateway's most consequential setting.
# --------------------------------------------------------------------------
mode: enforce

# --------------------------------------------------------------------------
# Execution watchdog. A forwarded tool call that has not answered within this
# deadline is abandoned: the client receives a synthesized timeout error, the
# abandonment is audited, and any LATE reply from the server is dropped on
# arrival (never forwarded, never uninspected).
# --------------------------------------------------------------------------
execution:
  timeout_seconds: 30

# --------------------------------------------------------------------------
# Workspace root. Every filesystem path an agent requests is canonicalized
# (symlinks, .., hard links all resolved to an absolute path) and must fall
# strictly inside this directory, or the call is denied. This single rule is
# the primary defense against path-traversal attacks like ../../etc/passwd.
# --------------------------------------------------------------------------
workspace_root: "/safe/workspace"

# --------------------------------------------------------------------------
# Tool allowlist registry. If this list is non-empty, ONLY tools named here
# may run at all — least privilege at the registry level, on top of per-tool
# tiers below. Anything not listed is denied (rule REG-001). Leave empty to
# let the `tools:` map be the sole authority (deny-by-default still applies).
# --------------------------------------------------------------------------
tool_registry:
  - read_file
  - list_directory
  - write_file
  - delete_file

# --------------------------------------------------------------------------
# Tool tiers. Each tool the agent may call is assigned a tier that sets its
# default decision. This is the asymmetric-approval model: reads run freely,
# mutations require a human. A tool not listed here is denied by default.
# --------------------------------------------------------------------------
# Each tool may declare `path_args`: the exact argument names that carry
# filesystem paths, so the policy — not a hardcoded guess list — is the
# authority on what gets canonicalized. Tools that omit path_args fall back
# to the default key list (path, file, filename, directory, dir).
#
# v3: each tool may also declare `egress_hosts`: a per-tool egress scope
# that NARROWS the global allowlist (a host must pass BOTH — scopes can
# subtract, never add, so no tool spec can quietly widen the perimeter;
# rule EGR-002). And `download_guard: true` opts a tool's responses into
# payload inspection even when the global downloads guard is off.
tools:
  read_file:
    tier: auto            # allow automatically
    inspect_response: true # scan returned data before handing to the agent
    path_args: [path]

  list_directory:
    tier: auto
    inspect_response: true
    path_args: [path]

  write_file:
    tier: escalate        # requires human approval before forwarding
    inspect_args: true
    path_args: [path]

  delete_file:
    tier: escalate
    path_args: [path]

  # Example of a network-capable tool with a per-tool egress scope. Even if
  # the global allowlist admits more, THIS tool may only reach these hosts.
  # http_get:
  #   tier: auto
  #   inspect_response: true
  #   download_guard: true
  #   url_args: [url]
  #   egress_hosts:
  #     - api.github.com

  # Example of a tool that is defined but hard-denied for now. Shell-style
  # tools are the highest RCE risk; keep them denied until argument
  # parameterization and canonicalization are proven in tests.
  run_command:
    tier: deny

# --------------------------------------------------------------------------
# Redaction. Patterns matched here are stripped from BOTH directions:
# arguments going to a tool, and data coming back to the agent's context.
# This prevents secrets and PII from leaking into tool calls or model memory.
# The named detectors map to implementations in proxy/inspect/redactor.py.
# --------------------------------------------------------------------------
redaction:
  enabled: true
  detectors:
    - api_keys          # high-entropy tokens, common key prefixes
    - aws_keys          # AKIA..., secret access keys
    - private_keys      # -----BEGIN ... PRIVATE KEY-----
    - emails
    - ssn
    - credit_cards
  # When a CREDENTIAL (aws_keys, private_keys, api_keys) is found in a tool
  # ARGUMENT, block the whole call — an agent moving a live credential is
  # itself a signal worth stopping. PII detectors (emails, ssn, credit_cards)
  # do NOT hard-block: they add risk and are surfaced to the human at the
  # tier gate, because legitimate work routinely mentions an email address.
  block_secrets_in_args: true

# --------------------------------------------------------------------------
# Egress allowlist. DENY BY DEFAULT: with `enabled: true` and an empty
# allowed_hosts list, NO network destination is permitted until one is added
# here — which is the correct starting posture for a zero-trust gateway. An
# injected instruction that steers the agent still has to move data OFF the
# machine; unlisted hosts die at this check. Wildcards: '*.example.com'
# allows subdomains but NOT example.com itself (list it separately).
#
# v3: allowed_schemes controls which URL schemes may appear at all
# (rule EGR-003). https-only is the recommended posture; http is included
# in the default for local development realities. ftp/file/gopher and
# friends never belong in an agent tool call.
# --------------------------------------------------------------------------
egress:
  enabled: true
  allowed_hosts: []
  allowed_schemes: [https, http]
  # allowed_hosts:
  #   - api.github.com
  #   - "*.internal.example.com"

# --------------------------------------------------------------------------
# v3 — Network Security subsystem. Everything below completes the trust
# boundary the minimal v1 allowlist opened: what a hostname RESOLVES TO,
# what comes BACK, how OFTEN, and whether planted tripwires ever move.
# --------------------------------------------------------------------------
network:

  # SSRF defense: every URL that passes the allowlist is resolved and EVERY
  # returned address is validated. Cloud metadata endpoints
  # (169.254.169.254 and friends) are always forbidden when this is on —
  # there is no legitimate agent route to an instance-credential service.
  # The three toggles below control the policy-choice classes and default
  # to blocked: zero trust means the operator opts INTO internal
  # reachability, never out of it. A host that resolved public before and
  # resolves internal now is flagged as a DNS-rebinding signature
  # (SSRF-002) rather than a generic violation (SSRF-001).
  ssrf:
    enabled: true
    block_private: true       # RFC 1918 / ULA
    block_loopback: true      # 127.0.0.0/8, ::1
    block_link_local: true    # 169.254.0.0/16, fe80::/10

  # DNS controls. Sinkholed hosts are denied unconditionally (DNS-001),
  # checked BEFORE the allowlist so a configuration conflict resolves to
  # the safe answer. pin_ttl_seconds bounds how long a validated
  # resolution is remembered for rebinding attribution.
  dns:
    sinkhole: []
    # sinkhole:
    #   - "*.pastebin-mirror.example"
    pin_ttl_seconds: 3600

  # Domain reputation — defense-in-depth OVER the allowlist. known_bad
  # denies even an allowlisted host (REP-001): an entry allowlisted last
  # year still gets blocked the day it turns up on a blocklist. Unknown
  # hosts are gated per unknown_action (REP-002): 'allow' trusts the
  # allowlist alone, 'escalate' puts a human in the loop, 'deny' requires
  # every reachable host to be affirmatively known. The runtime cache
  # persists to a human-readable JSON file.
  reputation:
    enabled: false
    unknown_action: allow     # allow | escalate | deny
    known_good: []
    known_bad: []
    cache_path: "audit/reputation_cache.json"
    ttl_seconds: 86400

  # Rate limiting — volume is a signal. A call must clear BOTH its per-tool
  # bucket (if declared) and the global bucket (rule RATE-001). In-process
  # token buckets by design: a single-host gateway does not need a network
  # hop to count to ten, and adding one would put a new availability
  # dependency in the deny path.
  rate_limit:
    enabled: true
    global:
      capacity: 120
      refill_per_second: 2
    per_tool: {}
    # per_tool:
    #   http_get: {capacity: 10, refill_per_second: 0.5}

  # Download guard — payloads returning from tools are inspected for
  # executables (DL-002), zip bombs by declared expansion and ratio
  # (DL-003), nested archives beyond the depth cap and encrypted members
  # (DL-004), and raw oversize (DL-001). Base64-transported binaries are
  # decoded and judged by what they decode to. `enabled: true` guards
  # every tool's responses; individual tools can also opt in via
  # `download_guard: true` on their spec.
  downloads:
    enabled: true
    max_bytes: 26214400                     # 25 MiB
    max_archive_expanded_bytes: 104857600   # 100 MiB declared expansion
    max_compression_ratio: 100
    max_archive_depth: 2
    block_executables: true

  # HTTP inspection — every redirect hop is a fresh network decision run
  # through the identical battery as the original URL (HTTP-002), with a
  # hop cap against loops (HTTP-001). Declared Content-Length over the cap
  # (HTTP-003) or a Content-Type outside allowed_mime_types (HTTP-004) is
  # refused before payload inspection spends any work. Leave
  # allowed_mime_types unset to accept any type (the download guard still
  # measures the actual bytes).
  http:
    max_redirect_hops: 5
    max_content_length: 26214400
    # allowed_mime_types:
    #   - text/*
    #   - application/json

  # Canary tokens — the zero-false-positive tripwire. When enabled, Warden
  # can mint unique markers and plant decoy files (a fake .env, an
  # SSH-key-shaped file) in the session workspace; a marker appearing in
  # ANY outbound tool argument is a confirmed exfiltration (CAN-001,
  # risk 100) — the only signal in the system permitted to claim
  # certainty. The vault persists so markers planted today are still
  # recognized in tomorrow's session.
  canary:
    enabled: true
    store_path: "audit/canary_vault.json"

# --------------------------------------------------------------------------
# Inbound tool-data inspection. Data returned FROM a tool (a scraped page,
# an email body, a file's contents) is untrusted and may contain hidden
# instructions aimed at the agent ("ignore previous instructions..."). The
# inspector flags these before the data reaches the agent's context window.
# In v1 this flags-and-annotates; escalation/stripping is configurable.
# --------------------------------------------------------------------------
inbound_inspection:
  enabled: true
  on_injection_detected: escalate   # allow | annotate | escalate | deny

# --------------------------------------------------------------------------
# Audit. Every decision is written to an append-only, hash-chained log so the
# record is tamper-evident: altering any entry breaks the chain.
# --------------------------------------------------------------------------
audit:
  enabled: true
  path: "audit/warden_audit.db"

# ---------------------------------------------------------------------------
# v4 — Identity & Trust. Absent or disabled, the identity layer is inert and
# v1–v3 behavior is unchanged. Enabled, it adds four controls: RBAC (whose
# request is this, and is this deployment even scoped to run it), capability
# tokens (may this tool do THIS to THAT, proven by a signed per-session
# grant), approval policies (the operator's "a human signs off on this"
# declarations), and memory integrity (signed, chained, versioned agent
# memory that cannot be silently edited or rolled back).
# ---------------------------------------------------------------------------
identity:

  # RBAC: the invoking user's role, intersected with the agent deployment's
  # scope. The intersection is the law from v3 egress scopes, applied to
  # identity: agent_scope can only NARROW what a role grants, never widen
  # it. Unknown users have no role and no role means no tools (RBAC-001) —
  # set default_role only to opt INTO anonymous access deliberately.
  rbac:
    enabled: false
    default_role: null
    # agent_scope: [read_file, http_get]    # omit for no narrowing
    roles:
      agent:
        tools: [read_file, http_get]
        capabilities:
          - {capability: filesystem.read, target: "*"}
          - {capability: network.egress,  target: "*"}
      operator:
        tools: ["*"]
        capabilities:
          - {capability: "filesystem.*", target: "*"}
          - {capability: network.egress, target: "*"}
    users:
      agent: agent

  # Capability tokens: per-request, HMAC-signed, scoped, expiring grants
  # minted by each session. A tool spec that declares `capability:` (e.g.
  # `read_file: {tier: auto, capability: filesystem.read, ...}`) is checked
  # against the session's grants for the CANONICAL target. CAP-001 is a
  # missing/expired/mis-scoped grant; CAP-002 is a forged or replayed token
  # — the latter has no benign explanation.
  capabilities:
    enabled: false

  # Approval policies: per-capability (or per-tool) declarations of when a
  # human must sign off. Policies only ADD requirements — nothing here can
  # lower a tier the operator set. History puts prior approve/reject counts
  # for the tool into the approval prompt, read from the audit chain.
  approval:
    timeout_seconds: 120
    history: true
    policies: {}
    # policies:
    #   filesystem.delete: always
    #   network.egress: "risk>=50"

  # Sessions: per-session workspace under `root` (default:
  # <workspace_root>/sessions), the role's grants minted at open, canary
  # decoys planted automatically, open/close on the audit chain, and the
  # whole thing DESTROYED at close — workspace wiped, signing key discarded,
  # every outstanding token dead with it.
  sessions:
    seed_canaries: true
    # root: sessions/

  # Memory integrity: agent long-term memory as an append-only, signed,
  # hash-chained, versioned store with a signed head pin against rollback.
  # Tampering is MEM-001; truncation/rollback is MEM-002. Encryption at
  # rest is optional and FAIL-LOUD: enabling it without the 'cryptography'
  # package is a policy error at startup, never a silent downgrade.
  memory:
    enabled: false
    encrypt: false
    # store_path: memory/agent_memory.json

# ---------------------------------------------------------------------------
# v5 — Runtime Containment. Absent or disabled, nothing changes. Enabled,
# the downstream MCP server runs inside a Warden-provisioned sandbox: Warden
# constructs the environment (never the workload's own config), the floor is
# non-negotiable (network none, read-only rootfs, cap-drop ALL,
# no-new-privileges — SBX-002 to attempt otherwise), and the isolation level
# is required-or-STRONGER, never weaker (SBX-001 if the host can't provide
# it). Outbound access for tools goes through the v3 egress battery at the
# proxy; the sandbox is not a second network path.
# ---------------------------------------------------------------------------
containment:
  enabled: false
  # The ladder, weakest to strongest: docker -> gvisor -> wasmtime.
  # allow_stronger lets provisioning climb; nothing ever descends.
  required_isolation: docker
  allow_stronger: true
  image: python:3.12-slim
  # wasm_module: server.wasm      # required if the rung is wasmtime
  tmpfs_size_mb: 64
  # Ephemeral writable surface: 'staging' works everywhere; 'overlay'
  # renders a Linux OverlayFS spec (read-only lower layer, provably
  # untouched). Destruction is verified — survivors are EPH-001.
  ephemeral: staging
  # Blast radius. All validated positive at load; a typo'd quota is a
  # startup error, never a silent 'unlimited'.
  quotas:
    cpus: 1.0
    memory_mb: 512
    disk_mb: 256
    pids: 64
    timeout_seconds: 300
  # What the workload DOES with its process table, not just what it
  # consumes. PROC-001 fork breach, PROC-002 zombies, PROC-003 overstay,
  # PROC-004 executable outside the allowlist.
  process_monitor:
    max_children: 8
    max_zombies: 0
    max_runtime_seconds: 300
    # allowed_executables: ["/usr/local/bin/python*"]

# ---------------------------------------------------------------------------
# v6 — Adaptive Security. Absent or disabled, nothing changes. Every control
# here only ever ADDS caution: it can raise a verdict toward restriction and
# route to a human, never lower one below the static floor above. Learned
# state never overrides a hard control.
# ---------------------------------------------------------------------------
adaptive:
  enabled: false
  # Behavioral baselines: learn each agent's normal, flag deviations as
  # ESCALATE hints (never autonomous denies). Learning is gated by a warm-up
  # and skips denied calls; a suspect agent's profile can be frozen.
  behavior:
    warmup_calls: 30
    novel_tool_points: 25
    novel_host_points: 40
    risk_spike_points: 30
    risk_spike_margin: 30
  # Intent verification: does the action match the session's stated goal?
  # Off-goal sensitive actions escalate to a human.
  intent:
    off_goal_points: 35
  # Adaptive context floors — same rule, stricter in a riskier context.
  # 'floor' can only raise a verdict; ALLOW is a no-op, DENY is the hardest.
  context_rules:
    - when: quarantined
      floor: ESCALATE
    - when: off_goal
      floor: ESCALATE
  # Quarantine is sticky: it persists until a named human clears it and never
  # self-expires (a timeout would let a patient adversary wait it out).
